<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Legal Entity Recognition</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>Legal Entity Recognition</h1>
    <p class="subtitle">
        AI-powered document analysis: Extract entities, sentiment & structured insights
    </p>

    <!-- Upload Section -->
    <label class="upload-box">
        <input type="file" id="fileInput" accept=".pdf" hidden>
        <span id="fileLabel">Upload PDF</span>
    </label>

    <button id="uploadBtn">Extract Entities</button>

    <p id="loading" class="hidden">Analyzing document, please wait<span class="dots"></span></p>

    <p id="successMsg" class="hidden success">Analysis Completed Successfully</p>

    <div id="result"></div>

</div>

<script src="app.js"></script>

</body>
</html>
